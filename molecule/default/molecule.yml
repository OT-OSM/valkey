---
dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: valkey-standalone-instance
    image: "geerlingguy/docker-debian11-ansible:latest"
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - /var/lib/containerd
    cgroupns_mode: host  
    privileged: true
    pre_build_image: true

provisioner:
  name: ansible
  config_options:
    defaults:
      roles_path: ${MOLECULE_PROJECT_DIRECTORY}/../
      remote_tmp: /tmp/.ansible/tmp
  inventory:
    host_vars:
      valkey-standalone-instance:
        is_molecule: true

  lint:
    name: ansible-lint
    
verifier:
  name: ansible
...