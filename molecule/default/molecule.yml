---
dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: valkey-standalone-instance
    image: "geerlingguy/docker-debian11-ansible:latest"
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - /var/lib/containerd
    cgroupns_mode: host  
    privileged: true
    pre_build_image: true

provisioner:
  name: ansible
  config_options:
    defaults:
      roles_path: ${MOLECULE_PROJECT_DIRECTORY}/../

  lint:
    name: ansible-lint
    
  inventory:
    groups:
      valkey_cluster: []
        
verifier:
  name: ansible
...