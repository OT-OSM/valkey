---
dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: valkey-node-1
    image: geerlingguy/docker-ubuntu2404-ansible:latest
    command: /sbin/init
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host 
    privileged: true
    pre_build_image: true
    groups:
      - valkey_cluster
  
  - name: valkey-node-2
    image: geerlingguy/docker-ubuntu2404-ansible:latest
    command: /sbin/init
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host 
    privileged: true
    pre_build_image: true
    groups:
      - valkey_cluster
  
  - name: valkey-node-3
    image: geerlingguy/docker-ubuntu2404-ansible:latest
    command: /sbin/init
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host 
    privileged: true
    pre_build_image: true
    groups:
      - valkey_cluster

provisioner:
  name: ansible
  config_options:
    defaults:
      roles_path: ${MOLECULE_PROJECT_DIRECTORY}/../
verifier:
  name: ansible