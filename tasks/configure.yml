---
- name: configure | Valkey config present in template
  ansible.builtin.template:
    src: "valkey.conf.j2"
    dest: "{{ valkey_config.conf_dir }}/valkey.conf"
    mode: '0644'
  notify: Restart Valkey

- name: Configure | Create required directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ valkey_config.user }}"
    group: "{{ user }}"
    mode: '0755'
  with_items:
    - "{{ valkey_config.conf_dir }}"
    - "{{ valkey_config.data_dir }}"
    - "{{ valkey_config.log_file | dirname }}"
    - "{{ valkey_config.install_dir }}"
...