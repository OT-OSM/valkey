valkey_version: "8.1.0"
valkey_mode: "standalone"  
valkey_port: 6380
valkey_bind: "0.0.0.0"
valkey_requirepass: ""
valkey_cluster_nodes: []
valkey_user: "valkey"
valkey_install_dir: /usr/local/bin
valkey_data_dir: "/var/lib/valkey"
valkey_conf_dir: "/etc/valkey"
valkey_log_file: "/var/log/valkey.log"
