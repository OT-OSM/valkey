---
- name: cluster | Ensure systemd service file is present
  ansible.builtin.template:
    src: valkey.service.j2
    dest: /etc/systemd/system/valkey.service
    owner: root
    group: root
    mode: '0644'
  notify: Restart Valkey

- name: cluster | Create cluster config file
  ansible.builtin.template:
    src: valkey.conf.j2
    dest: "{{ valkey_config.conf_dir }}/valkey.conf"
    mode: '0644'
  notify: Restart Valkey

- name: cluster | Start Valkey for cluster
  ansible.builtin.systemd:
    name: valkey
    enabled: true
    state: started
  notify: Restart Valkey

- name: cluster | Restart Valkey after configuration change
  ansible.builtin.systemd:
    name: valkey
    state: restarted
...
